services:
  # 1. The PostgreSQL Database
  - type: pserv
    name: bug-tracker-db
    plan: free
    # (Lines deleted here: databaseName aur user ab zaroorat nahi hai)

  # 2. The Python Web Service
  - type: web
    name: bug-tracker-app
    plan: free
    runtime: python
    rootDir: CloudBug  # Yeh line add ki hai taaki Render sahi folder mein commands run kare
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bug-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"